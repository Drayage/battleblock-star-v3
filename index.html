<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Battle Block Star v3.0</title>
  <link rel="stylesheet" href="./src/styles.css">
</head>
<body>
  <main id="app">
    <section id="menu" class="screen active">
      <h1>Battle Block Star</h1>
      <p class="subtitle">Tetris roguelike 1v1 battle action v3.0</p>
      <div class="panel">
        <h2>Run Status</h2>
        <div class="stat-grid">
          <span>Round</span><strong id="menuRound">1 / 20</strong>
          <span>Gold</span><strong id="menuGold">0</strong>
          <span>HP Rows</span><strong id="menuHp">20</strong>
          <span>Deck</span><strong id="menuDeck">21 cards</strong>
        </div>
      </div>
      <div class="panel">
        <h2>Controls</h2>
        <div class="control-grid">
          <span>Arrows</span><span>Move / soft drop</span>
          <span>Up / X / Z</span><span>Rotate</span>
          <span>Space / C</span><span>Hard drop / hold</span>
          <span>1 2 3</span><span>Skills</span>
        </div>
      </div>
      <button id="startRunBtn" class="primary">Start Run</button>
    </section>

    <section id="mapScreen" class="screen">
      <header class="topbar">
        <div>
          <strong id="mapTitle">Round 1</strong>
          <span id="mapMeta">Choose an enemy</span>
        </div>
      </header>
      <div id="enemyChoices" class="choice-grid"></div>
      <div id="rewardPanel" class="panel hidden">
        <h2>Reward</h2>
        <div id="rewardChoices" class="choice-grid compact"></div>
      </div>
    </section>

    <section id="shopScreen" class="screen">
      <header class="topbar">
        <div>
          <strong>Checkpoint Shop</strong>
          <span id="shopGold">Gold 0</span>
        </div>
        <button id="leaveShopBtn" class="ghost">Next Battle</button>
      </header>
      <div id="shopItems" class="choice-grid"></div>
    </section>

    <section id="gameScreen" class="screen">
      <div class="hud">
        <div><strong id="battleTitle">Battle</strong><span id="battleMeta"></span></div>
        <button id="forfeitBtn" class="ghost danger">Forfeit</button>
      </div>
      <div id="canvasWrap"><canvas id="gameCanvas"></canvas></div>
      <div id="mobilePad">
        <button class="edge" data-action="left" aria-label="Move left">◀</button>
        <div class="pad-center">
          <div class="pad-actions">
            <button class="big" data-action="ccw" aria-label="Rotate counterclockwise">↺</button>
            <button class="big" data-action="rotate" aria-label="Rotate clockwise">↻</button>
            <button data-action="soft" aria-label="Soft drop">↓</button>
            <button data-action="hard" aria-label="Hard drop">⬇</button>
            <button data-action="hold" aria-label="Hold">□</button>
          </div>
          <div class="pad-skills" id="touchSkills"></div>
        </div>
        <button class="edge" data-action="right" aria-label="Move right">▶</button>
      </div>
    </section>

    <section id="endScreen" class="screen">
      <h1 id="endTitle">Run Complete</h1>
      <p id="endSummary" class="subtitle"></p>
      <button id="restartRunBtn" class="primary">Restart Run</button>
      <button id="mainMenuBtn" class="ghost wide">Main Menu</button>
    </section>
  </main>

  <script type="module" src="./src/game.js"></script>
</body>
</html>
